{% set version = "0.51.0" %}

package:
  name: uharfbuzz
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/uharfbuzz/uharfbuzz-{{ version }}.tar.gz
  sha256: fbddcff72e2f6af5ce6b22ede1f91f6c019cb9dee6b5bf81f1bdbfdf83c1d47b

build:
  script:
    - rm -rf harfbuzz           # [unix]
    - export USE_SYSTEM_LIBS=1  # [unix]
    - del harfbuzz /s /q        # [win]
    - set USE_SYSTEM_LIBS=1     # [win]
    - {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - pkgconfig                              # [build_platform != target_platform]
    - pkg-config
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - pip
    - python
    - setuptools-scm
    - cython
    - pkgconfig
    - setuptools
    - harfbuzz
  run:
    - python

test:
  imports:
    - uharfbuzz
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/trufont/uharfbuzz
  summary: Streamlined Cython bindings for the harfbuzz shaping engine
  license: Apache-2.0
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
